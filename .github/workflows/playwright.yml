name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    # Environment variables mirror .env.example.
    # For real credentials use GitHub repository secrets:
    #   Settings → Secrets and Variables → Actions → New repository secret
    env:
      BASE_URL:           ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
      TEST_ENV:           ${{ secrets.TEST_ENV || 'ci' }}
      STANDARD_USER:      ${{ secrets.STANDARD_USER || 'standard_user' }}
      STANDARD_PASSWORD:  ${{ secrets.STANDARD_PASSWORD || 'secret_sauce' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Visual regression snapshots are committed to source control.
      # Upload updated snapshots as an artifact so PRs can inspect diffs.
      - name: Upload visual snapshots (if updated)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: tests/__snapshots__/
          retention-days: 14

  deploy-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'playwright-report'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
